name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Run vitest
        run: npx vitest run

  e2e:
    name: Playwright e2e (CTA scroll)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Install the bundled Chromium *and* the Linux system libraries it needs
      # (glib, nss, nspr, atk, at-spi2-atk, cups, libxkbcommon, alsa, mesa,
      # libdrm, dbus, expat, libX11/Xcb/Xcomposite/Xdamage/Xext/Xfixes/Xrandr,
      # pango, cairo, gtk3, at-spi2-core). `--with-deps` is the supported way
      # to do this on ubuntu-latest images.
      - name: Install Playwright browser + system deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        run: npx playwright test
        env:
          NODE_ENV: development

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
